# ==============================================================================
# Grafana 仪表板配置
# ==============================================================================
# 此文件配置 Grafana 自动加载仪表板
# ==============================================================================

apiVersion: 1

providers:
  # ---- 文件型仪表板提供商 ----
  - name: 'Moling Dashboards'
    orgId: 1
    folder: ''
    folderUid: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provision_ing/dashboards
      # 搜索子目录
      foldersFromFilesStructure: true
