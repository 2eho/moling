# ==============================================================================
# Grafana 仪表板自动加载配置
# ==============================================================================
# Grafana 启动时自动扫描以下路径加载 JSON 仪表板定义
# ==============================================================================

apiVersion: 1

providers:
  # ── 概览仪表板 (遗留) ───────────────────────────────────────
  - name: 'Moling Overview'
    orgId: 1
    folder: 'Moling'
    folderUid: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false

  # ── API 仪表板 (新) ─────────────────────────────────────────
  - name: 'Moling API Dashboards'
    orgId: 1
    folder: 'Moling'
    folderUid: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: true
