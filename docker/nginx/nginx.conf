# =============================================================================
# Moling Nginx 配置（安全加固版）
# =============================================================================
# 功能:
#   1. HTTP 强制跳转 HTTPS
#   2. 提供前端静态文件
#   3. 反向代理后端 API (/api/*)
#   4. 支持 WebSocket（如需实时功能）
#   5. Gzip 压缩
#   6. 缓存优化
#   7. 安全响应头（HSTS, X-Frame-Options, etc.）
# =============================================================================

# =============================================================================
# HTTP 服务器 — 强制跳转 HTTPS
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    
    server_name localhost yourdomain.com;  # 修改为实际域名
    
    # 强制 HTTP -> HTTPS 跳转
    return 301 https://$server_name$request_uri;
}

# =============================================================================
# HTTPS 服务器（生产环境）
# =============================================================================
server {
    # 监听端口
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    # 服务器名称（生产环境修改为实际域名）
    server_name localhost yourdomain.com;
    
    # ==========================================================================
    # SSL 证书配置
    # ==========================================================================
    # 生产环境：取消注释并配置实际证书路径
    # ssl_certificate /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # 开发/测试环境：可以注释掉 SSL 证书行，或使用自签名证书
    
    # SSL 配置优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # ==========================================================================
    # 安全响应头
    # ==========================================================================
    # HSTS (HTTP Strict Transport Security) — 强制浏览器使用 HTTPS
    # max-age=31536000: 1 年
    # includeSubDomains: 包含所有子域名
    # preload: 允许预加载到浏览器 HSTS 列表
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # 防止 MIME 类型嗅探（XSS 防护）
    add_header X-Content-Type-Options "nosniff" always;
    
    # 防止点击劫持（禁止在 frame 中显示）
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Referrer Policy — 控制 Referrer 头
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy (CSP) — 防止 XSS 攻击
    # 注意：过于严格的 CSP 可能破坏前端功能，请根据实际情况调整
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://$host wss://$host;" always;
    
    # 移除 X-Powered-By 头（隐藏技术栈信息）
    proxy_hide_header X-Powered-By;
    add_header X-Powered-By "" always;
    
    # ==========================================================================
    # 日志配置
    # ==========================================================================
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # ==========================================================================
    # Gzip 压缩
    # ==========================================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/javascript application/xml+rss 
               application/json application/xml;
    
    # ==========================================================================
    # 前端静态文件
    # ==========================================================================
    root /usr/share/nginx/html;
    index index.html;
    
    # 静态资源缓存（JS/CSS/图片等）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Next.js 静态文件（如果使用 Next.js）
    location /_next/static {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # ==========================================================================
    # 健康检查端点
    # ==========================================================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # ==========================================================================
    # 后端 API 反向代理
    # ==========================================================================
    location /api {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 禁用缓冲（用于流式响应）
        proxy_buffering off;
    }
    
    # ==========================================================================
    # 后端健康检查端点（直接代理）
    # ==========================================================================
    location /api/v1/health {
        proxy_pass http://app:8000/api/v1/health;
        proxy_set_header Host $host;
        access_log off;
    }
    
    # ==========================================================================
    # SPA  fallback（单页应用路由支持）
    # ==========================================================================
    location / {
        try_files $uri $uri/ /index.html;
        
        # SPA 不缓存 HTML（确保用户获得最新版本）
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # ==========================================================================
    # 错误页面
    # ==========================================================================
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
