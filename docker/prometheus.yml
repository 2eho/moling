# ==============================================================================
# Prometheus 配置
# ==============================================================================
# 用于监控 Moling 项目的所有服务
# 访问: http://localhost:9090
# ==============================================================================

global:
  # 抓取间隔
  scrape_interval: 15s
  # 评估规则间隔
  evaluation_interval: 15s
  # 外部标签
  external_labels:
    monitor: 'moling-monitor'

# 告警管理器配置 → 飞书
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# 告警规则（飞书消息的数据源头）
rule_files:
  - "/etc/prometheus/alert_rules.yml"

# 抓取配置
scrape_configs:
  # ---- Prometheus 自身监控 ----
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ---- Node Exporter (系统指标) ----
  # 需要添加 node-exporter 服务到 docker-compose.yml
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']

  # ---- FastAPI 后端应用 ----
  # 需要在后端应用中添加 /metrics 端点 (使用 prometheus-fastapi-instrumentator)
  - job_name: 'moling-backend'
    static_configs:
      - targets: ['app:8000']
    metrics_path: '/metrics'
    # 如果后端还没有 /metrics 端点，可以暂时禁用
    # 取消注释以下行以启用
    # enabled: false

  # ---- Redis 监控 ----
  # 需要添加 redis_exporter
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # ---- PostgreSQL 监控 ----
  # 需要添加 postgres_exporter
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # ---- Docker 容器监控 ----
  # 使用 cAdvisor 或 node-exporter 的 Docker 版本
  # - job_name: 'docker'
  #   static_configs:
  #     - targets: ['cadvisor:8080']

  # ---- Nginx 监控 ----
  # 需要启用 Nginx stub_status 模块
  # - job_name: 'nginx'
  #   static_configs:
  #     - targets: ['frontend:80']

# 远程写入配置（可选，用于长期存储）
# remote_write:
#   - url: "https://prometheus-remote-write.example.com/api/v1/write"
#     basic_auth:
#       username: "username"
#       password: "password"
