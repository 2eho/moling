version: "3.8"

# ==============================================================================
# Moling Docker Compose 配置
# ==============================================================================
# 架构说明:
#   - frontend: Nginx 提供前端静态文件 + 反向代理后端 API
#   - app: FastAPI 后端应用
#   - worker: Celery 异步任务 worker
#   - db: PostgreSQL 17 + pgvector 扩展
#   - redis: Redis 7 缓存和消息队列
#
# 使用说明:
#   1. 复制 moling-server/.env.example 为 moling-server/.env 并修改配置
#   2. 运行 docker-compose up -d --build 启动所有服务
#   3. 访问 http://localhost 查看前端
#   4. 访问 http://localhost/api/v1/docs 查看 API 文档
# ==============================================================================

services:
  # ---- Frontend (Nginx + 静态文件 + API 反向代理) ----
  frontend:
    build:
      context: ../moling-web
      dockerfile: Dockerfile
    container_name: moling-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL 证书（可选，生产环境使用）
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - moling-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---- FastAPI 应用 ----
  app:
    build:
      context: ../moling-server
      dockerfile: Dockerfile
    container_name: moling-api
    # 不对外暴露端口，仅通过内部网络访问（由 frontend 代理）
    expose:
      - "8000"
    env_file:
      - ../moling-server/.env
    environment:
      # 默认使用 SQLite（单文件，MVP 部署推荐）
      # 切换 PostgreSQL: postgresql+asyncpg://${POSTGRES_USER:-moling}:${POSTGRES_PASSWORD:-moling}@db:5432/${POSTGRES_DB:-moling}
      - DATABASE_URL=sqlite+aiosqlite:///app/data/moling.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - LLM_API_BASE=${LLM_API_BASE:-http://host.docker.internal:4000/v1}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - moling-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---- Celery Worker ----
  worker:
    build:
      context: ../moling-server
      dockerfile: Dockerfile
    container_name: moling-worker
    command: celery -A app.core.celery_app worker --loglevel=info
    env_file:
      - ../moling-server/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///app/data/moling.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - LLM_API_BASE=${LLM_API_BASE:-http://host.docker.internal:4000/v1}
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - moling-network
    restart: unless-stopped

  # ---- PostgreSQL 17 + pgvector ----
  db:
    image: pgvector/pgvector:pg17
    container_name: moling-db
    # 生产环境不建议对外暴露数据库端口
    # ports:
    #   - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-moling}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moling}
      POSTGRES_DB: ${POSTGRES_DB:-moling}
    volumes:
      # 数据库数据持久化
      - pgdata:/var/lib/postgresql/data
      # 初始化脚本（可选）
      # - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moling} -d ${POSTGRES_DB:-moling}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - moling-network
    restart: unless-stopped

  # ---- Redis 7 ----
  redis:
    image: redis:7-alpine
    container_name: moling-redis
    # 生产环境不建议对外暴露 Redis 端口
    # ports:
    #   - "6379:6379"
    volumes:
      # Redis 数据持久化
      - redisdata:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-moling_redis_password}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-moling_redis_password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - moling-network
    restart: unless-stopped

  # ---- Prometheus 监控 ----
  prometheus:
    image: prom/prometheus:latest
    container_name: moling-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - moling-network
    restart: unless-stopped

  # ---- Grafana 可视化仪表板 ----
  grafana:
    image: grafana/grafana:latest
    container_name: moling-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - moling-network
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  moling-network:
    driver: bridge
    # 自定义子网（可选）
    # ipam:
    #   config:
    #     - subnet: 172.20.0.0/16

volumes:
  # PostgreSQL 数据
  pgdata:
    driver: local
  # Redis 数据
  redisdata:
    driver: local
  # Prometheus 数据
  prometheusdata:
    driver: local
  # Grafana 数据
  grafanadata:
    driver: local
