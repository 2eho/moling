services:
  # ---- PostgreSQL ----
  db:
    image: postgres:16-alpine
    container_name: moling-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: moling
      POSTGRES_PASSWORD: moling
      POSTGRES_DB: moling
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moling -d moling"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - moling-net

  # ---- 后端 API ----
  app:
    build:
      context: ./moling-server
      dockerfile: Dockerfile
    container_name: moling-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./moling-server/.env
    environment:
      # 容器内连接 db 容器，不走 localhost
      # 使用 psycopg 3.x 驱动（异步/同步均支持，不依赖 greenlet）
      - DATABASE_URL=postgresql+psycopg://moling:moling@db:5432/moling
      # CORS：允许前端通过 Nginx 访问
      # 生产环境替换为实际服务器 IP
      - CORS_ORIGINS=http://localhost:8080,http://服务器IP:8080
      # 生产环境标记
      - ENVIRONMENT=production
    volumes:
      - ./moling-server:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - moling-net

  # ---- 前端 Next.js ----
  web:
    build:
      context: ./moling-web
      dockerfile: Dockerfile
      args:
        # 构建时使用相对路径前缀，浏览器自动拼接到当前 origin
        # 格式：/路径前缀/api/v1
        NEXT_PUBLIC_API_BASE_URL: /moling/api/v1
    container_name: moling-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # 运行时环境变量（虽然 NEXT_PUBLIC_ 主要使用构建时的值，保持一致性）
      - NEXT_PUBLIC_API_BASE_URL=/moling/api/v1
    depends_on:
      - app
    networks:
      - moling-net

networks:
  moling-net:
    driver: bridge

volumes:
  pgdata:
