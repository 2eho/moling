# ==============================================================================
# Moling 根目录 Docker Compose — 开发 / 快速部署
# ==============================================================================
# 说明:
#   - 此文件用于本地开发和快速部署（3 个核心服务）
#   - 生产级完整编排（含 Worker/Prometheus/Grafana/Nginx）见 docker/docker-compose.yml
#   - 网络名统一为 moling-network
#
# 启动: docker compose up -d --build
# 访问: http://localhost:8080/moling（需配合宿主机 Nginx）
#       或直接 http://localhost:3000（前端）, http://localhost:8000/docs（后端）
# ==============================================================================

services:
  # ---- PostgreSQL 16 ----
  db:
    image: postgres:16-alpine
    container_name: moling-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: moling
      POSTGRES_PASSWORD: moling
      POSTGRES_DB: moling
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moling -d moling"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - moling-network

  # ---- Redis 7 — 缓存 + Celery 消息队列 + JWT 黑名单 ----
  redis:
    image: redis:7-alpine
    container_name: moling-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - moling-network

  # ---- 后端 FastAPI ----
  app:
    build:
      context: ./moling-server
      dockerfile: Dockerfile
    container_name: moling-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./moling-server/.env
    environment:
      # 容器内通过服务名连接 PostgreSQL
      - DATABASE_URL=postgresql+psycopg://moling:moling@db:5432/moling
      # Redis 连接（JWT 黑名单 + 缓存 + Celery）
      - REDIS_URL=redis://redis:6379/0
      # CORS：允许本地和 Nginx 访问
      - CORS_ORIGINS=http://localhost:8080,http://localhost:3000
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - moling-network

  # ---- 前端 Next.js ----
  web:
    build:
      context: ./moling-web
      dockerfile: Dockerfile
      args:
        # 构建时注入 API 路径前缀（浏览器运行时拼接当前 origin）
        NEXT_PUBLIC_API_BASE_URL: /moling/api/v1
    container_name: moling-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - app
    networks:
      - moling-network

networks:
  moling-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
