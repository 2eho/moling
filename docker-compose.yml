services:
  app:
    build:
      context: ./moling-server
      dockerfile: Dockerfile
    container_name: moling-app
    restart: unless-stopped
    ports:                              # ✅ nginx 在宿主机上，需要端口映射
      - "8000:8000"                     # nginx proxy_pass → 127.0.0.1:8000
    env_file:
      - ./moling-server/.env
    volumes:
      - ./moling-server:/app
    networks:
      - moling-net

  web:
    build:
      context: ./moling-web
      dockerfile: Dockerfile
    container_name: moling-web
    restart: unless-stopped
    ports:
      - "3000:3000"                     # ✅ 映射 3000，不碰 8080（nginx在用）
    environment:
      - NODE_ENV=production
    depends_on:
      - app
    networks:
      - moling-net

networks:
  moling-net:
    driver: bridge
