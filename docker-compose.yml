version: "3.9"

# ==============================================================================
# 墨灵 Docker Compose — MVP 部署配置
# ==============================================================================
# 启动: docker compose up -d --build
# 日志: docker compose logs -f
# 停止: docker compose down
# ==============================================================================

services:
  # ---- 后端 API ----
  app:
    build:
      context: ./moling-server
    ports:
      - "8000:8000"
    env_file:
      - ./moling-server/.env
    environment:
      # SQLite 数据库（文件存储在卷中）
      - DATABASE_URL=sqlite+aiosqlite:///app/data/moling.db
      # Redis（可选，Celery 任务队列需要）
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - app_data:/app/data
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ---- Redis（Celery 任务队列）----
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- 前端 Next.js ----
  web:
    build:
      context: ./moling-web
      target: runner
      args:
        # 构建时必须传入正确的前端 API 地址！
        # 例: docker compose build --build-arg NEXT_PUBLIC_API_BASE_URL=http://123.45.67.89:8000/api/v1 web
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  app_data:
  redis_data:
