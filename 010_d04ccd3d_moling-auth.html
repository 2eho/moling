<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>墨灵 · 登录</title>
<style>
/* ══ Design Tokens (一致) ══ */
:root {
  --color-bg: #0d0f1a;
  --color-surface: #151829;
  --color-elevated: #1a1d31;
  --color-text-primary: #e8e9f0;
  --color-text-secondary: #9ca3c4;
  --color-text-tertiary: #6b7199;
  --color-text-disabled: #3d4166;
  --color-brand-indigo: #6366f1;
  --color-brand-amber: #d4a843;
  --color-border: #2a2d45;
  --color-border-subtle: #1e2138;
  --color-success: #34d399;
  --color-danger: #ef4444;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --font-body: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-heading: 'Noto Serif SC', '思源宋体', Georgia, serif;
  --duration-normal: 200ms;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--color-bg);
  color: var(--color-text-primary);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
a { color: var(--color-brand-indigo); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ══ 容器 ══ */
.auth-container {
  width: 100%;
  max-width: 420px;
  padding: var(--space-5);
}
.auth-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border-subtle);
  border-radius: var(--radius-xl);
  padding: var(--space-8) var(--space-6);
}
.auth-header {
  text-align: center;
  margin-bottom: var(--space-8);
}
.auth-logo {
  font-family: var(--font-heading);
  font-size: 28px;
  color: var(--color-text-primary);
  letter-spacing: 2px;
  margin-bottom: var(--space-2);
}
.auth-logo span { color: var(--color-brand-indigo); }
.auth-subtitle {
  font-size: 13px;
  color: var(--color-text-tertiary);
}

/* ══ Tab 切换 ══ */
.auth-tabs {
  display: flex;
  gap: 0;
  margin-bottom: var(--space-6);
  border-bottom: 1px solid var(--color-border);
}
.auth-tab {
  flex: 1;
  padding: var(--space-3) 0;
  text-align: center;
  font-size: 14px;
  color: var(--color-text-tertiary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all var(--duration-normal);
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}
.auth-tab.active {
  color: var(--color-text-primary);
  border-bottom-color: var(--color-brand-indigo);
}
.auth-tab:hover { color: var(--color-text-secondary); }

/* ══ 表单 ══ */
.auth-form { display: none; }
.auth-form.active { display: block; }
.form-group { margin-bottom: var(--space-5); }
.form-label {
  display: block;
  font-size: 12px;
  color: var(--color-text-secondary);
  margin-bottom: var(--space-2);
  font-weight: 500;
}
.form-input {
  width: 100%;
  padding: 10px 14px;
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  color: var(--color-text-primary);
  font-size: 14px;
  transition: border-color var(--duration-normal);
  font-family: inherit;
}
.form-input:focus { border-color: var(--color-brand-indigo); outline: none; }
.form-input::placeholder { color: var(--color-text-disabled); }
.form-input.error { border-color: var(--color-danger); }
.form-hint {
  font-size: 11px;
  color: var(--color-text-tertiary);
  margin-top: var(--space-1);
}
.form-hint.error { color: var(--color-danger); }

.form-actions { margin-top: var(--space-6); }
.btn-primary {
  width: 100%;
  padding: 11px;
  background: var(--color-brand-indigo);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity var(--duration-normal);
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary.loading { position: relative; color: transparent; }
.btn-primary.loading::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  top: 50%; left: 50%;
  margin: -8px 0 0 -8px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══ 分割线 ══ */
.divider {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin: var(--space-6) 0;
  color: var(--color-text-disabled);
  font-size: 11px;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--color-border);
}

/* ══ 社交登录 ══ */
.social-btns {
  display: flex;
  gap: var(--space-3);
}
.social-btn {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  background: var(--color-bg);
  color: var(--color-text-secondary);
  font-size: 13px;
  cursor: pointer;
  text-align: center;
  transition: border-color var(--duration-normal);
  font-family: inherit;
}
.social-btn:hover { border-color: var(--color-text-tertiary); }
.social-btn svg { vertical-align: middle; margin-right: 6px; }

/* ══ 底部链接 ══ */
.auth-footer {
  text-align: center;
  margin-top: var(--space-5);
  font-size: 12px;
  color: var(--color-text-tertiary);
}
.auth-footer a { margin: 0 4px; }

/* ══ Toast ══ */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--color-elevated);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 10px 20px;
  font-size: 13px;
  color: var(--color-text-primary);
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 1000;
  white-space: nowrap;
}
.toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { border-color: var(--color-danger); color: var(--color-danger); }
.toast.success { border-color: var(--color-success); color: var(--color-success); }

/* ══ 响应式 ══ */
@media (max-width: 480px) {
  .auth-container { padding: var(--space-4); }
  .auth-card { padding: var(--space-6) var(--space-4); }
  .social-btn { font-size: 12px; padding: 8px; }
}

/* ══ 密码可见切换 ══ */
.password-wrapper { position: relative; }
.password-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--color-text-tertiary);
  cursor: pointer;
  font-size: 13px;
  padding: 4px;
}
.password-toggle:hover { color: var(--color-text-secondary); }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo"><span>墨</span>灵</div>
      <div class="auth-subtitle">AI 驱动的网文创作平台</div>
    </div>

    <!-- Tab -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">登录</button>
      <button class="auth-tab" data-tab="register" onclick="switchTab('register')">注册</button>
    </div>

    <!-- ══ 登录表单 ══ -->
    <form class="auth-form active" id="formLogin" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="loginEmail">邮箱</label>
        <input class="form-input" id="loginEmail" type="email" placeholder="your@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">密码</label>
        <div class="password-wrapper">
          <input class="form-input" id="loginPassword" type="password" placeholder="输入密码" required autocomplete="current-password" minlength="6">
          <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">显示</button>
        </div>
      </div>
      <div style="text-align:right;margin-bottom:var(--space-4)">
        <a href="#" onclick="showToast('密码重置功能开发中');return false" style="font-size:12px">忘记密码？</a>
      </div>
      <div class="form-actions">
        <button class="btn-primary" id="loginBtn" type="submit">登 录</button>
      </div>
    </form>

    <!-- ══ 注册表单 ══ -->
    <form class="auth-form" id="formRegister" onsubmit="return handleRegister(event)">
      <div class="form-group">
        <label class="form-label" for="regNickname">笔名</label>
        <input class="form-input" id="regNickname" type="text" placeholder="你的创作笔名" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="regEmail">邮箱</label>
        <input class="form-input" id="regEmail" type="email" placeholder="your@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="regPassword">密码</label>
        <div class="password-wrapper">
          <input class="form-input" id="regPassword" type="password" placeholder="至少 6 位" required minlength="6" autocomplete="new-password">
          <button type="button" class="password-toggle" onclick="togglePassword('regPassword', this)">显示</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="regConfirm">确认密码</label>
        <input class="form-input" id="regConfirm" type="password" placeholder="再次输入密码" required autocomplete="new-password">
      </div>
      <div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:var(--space-4);line-height:1.6">
        <label><input type="checkbox" id="regAgree" checked> 我已阅读并同意 <a href="#" onclick="showToast('服务协议');return false">《服务协议》</a>和<a href="#" onclick="showToast('隐私政策');return false">《隐私政策》</a></label>
      </div>
      <div class="form-actions">
        <button class="btn-primary" id="registerBtn" type="submit">注 册</button>
      </div>
    </form>

    <!-- 社交登录 -->
    <div class="divider">或</div>
    <div class="social-btns">
      <button class="social-btn" onclick="showToast('微信登录开发中')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8.5 13.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5S10 11.17 10 12s-.67 1.5-1.5 1.5zm5 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5S15 11.17 15 12s-.67 1.5-1.5 1.5zM12 3C7.03 3 3 6.37 3 10.5c0 2.12 1.05 4.05 2.76 5.48L5 19l3.5-1.95c1.13.4 2.35.65 3.5.65 4.97 0 9-3.37 9-7.5S16.97 3 12 3z"/></svg>
        微信
      </button>
      <button class="social-btn" onclick="showToast('QQ 登录开发中')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
        QQ
      </button>
    </div>

    <div class="auth-footer">
      注册即表示同意《服务协议》和《隐私政策》
    </div>
  </div>
</div>

<script>
// ── Toast ──
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast visible' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('visible'); }, 3000);
}

// ── Tab 切换 ──
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(function(el) {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  document.querySelectorAll('.auth-form').forEach(function(el) {
    el.classList.toggle('active', el.id === 'form' + tab.charAt(0).toUpperCase() + tab.slice(1));
  });
}

// ── 密码可见切换 ──
function togglePassword(inputId, btn) {
  var input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '隐藏';
  } else {
    input.type = 'password';
    btn.textContent = '显示';
  }
}

// ── 登录 ──
async function handleLogin(e) {
  e.preventDefault();
  var btn = document.getElementById('loginBtn');
  var email = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPassword').value;

  if (!email || !password) { showToast('请填写邮箱和密码', 'error'); return false; }

  btn.disabled = true;
  btn.classList.add('loading');

  try {
    // POST /api/v1/auth/login
    // 请求: { email, password }
    // 响应: { access_token, refresh_token, user: { id, nickname, email } }
    var res = await fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    });
    if (!res.ok) {
      var err = await res.json();
      showToast(err.message || '登录失败', 'error');
      btn.disabled = false;
      btn.classList.remove('loading');
      return false;
    }
    var data = await res.json();
    localStorage.setItem('access_token', data.access_token);
    localStorage.setItem('refresh_token', data.refresh_token);
    localStorage.setItem('user', JSON.stringify(data.user));
    showToast('登录成功', 'success');
    setTimeout(function() { window.location.href = '/projects'; }, 800);
  } catch (e) {
    showToast('网络错误，请检查连接', 'error');
    btn.disabled = false;
    btn.classList.remove('loading');
  }
  return false;
}

// ── 注册 ──
async function handleRegister(e) {
  e.preventDefault();
  var btn = document.getElementById('registerBtn');
  var nickname = document.getElementById('regNickname').value.trim();
  var email = document.getElementById('regEmail').value.trim();
  var password = document.getElementById('regPassword').value;
  var confirm = document.getElementById('regConfirm').value;

  if (!nickname || !email || !password || !confirm) {
    showToast('请填写所有字段', 'error'); return false;
  }
  if (password.length < 6) { showToast('密码至少 6 位', 'error'); return false; }
  if (password !== confirm) { showToast('两次密码不一致', 'error'); return false; }
  if (!document.getElementById('regAgree').checked) { showToast('请同意服务协议', 'error'); return false; }

  btn.disabled = true;
  btn.classList.add('loading');

  try {
    // POST /api/v1/auth/register
    // 请求: { nickname, email, password }
    // 响应: { id, email, nickname, created_at }
    var res = await fetch('/api/v1/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname: nickname, email: email, password: password })
    });
    if (!res.ok) {
      var err = await res.json();
      showToast(err.message || '注册失败', 'error');
      btn.disabled = false;
      btn.classList.remove('loading');
      return false;
    }
    showToast('注册成功，请登录', 'success');
    // 自动切到登录 tab
    switchTab('login');
    document.getElementById('loginEmail').value = email;
  } catch (e) {
    showToast('网络错误，请检查连接', 'error');
  }
  btn.disabled = false;
  btn.classList.remove('loading');
  return false;
}
</script>
</body>
</html>
