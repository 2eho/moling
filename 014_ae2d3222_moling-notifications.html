<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>通知 · 墨灵</title>
<style>
:root {
  --color-bg: #0d0f1a; --color-surface: #151829; --color-elevated: #1a1d31;
  --color-text-primary: #e8e9f0; --color-text-secondary: #9ca3c4; --color-text-tertiary: #6b7199;
  --color-text-disabled: #3d4166; --color-brand-indigo: #6366f1;
  --color-border: #2a2d45; --color-border-subtle: #1e2138;
  --color-success: #34d399; --color-warning: #fbbf24; --color-danger: #ef4444;
  --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px;
  --space-3: 12px; --space-4: 16px; --space-5: 20px; --space-6: 24px; --space-8: 32px;
  --font-body: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-heading: 'Noto Serif SC', Georgia, serif;
  --header-height: 52px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-body); background: var(--color-bg); color: var(--color-text-primary);
  font-size: 14px; -webkit-font-smoothing: antialiased;
}
/* 头部 */
.header {
  display: flex; align-items: center; padding: 0 var(--space-5);
  height: var(--header-height); border-bottom: 1px solid var(--color-border-subtle);
  background: var(--color-surface);
}
.header-back { color: var(--color-text-secondary); text-decoration: none; font-size: 13px; margin-right: var(--space-4); }
.header-back:hover { color: var(--color-text-primary); }
.header h1 { font-size: 16px; font-weight: 600; flex: 1; }
.header-actions { display: flex; gap: var(--space-3); }
.header-actions button {
  padding: 6px 14px; border-radius: var(--radius-md); font-size: 12px;
  border: 1px solid var(--color-border); background: transparent; color: var(--color-text-secondary); cursor: pointer;
}
.header-actions button:hover { border-color: var(--color-text-tertiary); color: var(--color-text-primary); }
/* 容器 */
.container { max-width: 640px; margin: 0 auto; padding: var(--space-4); }
/* 通知列表 */
.notif-item {
  display: flex; gap: var(--space-3); padding: var(--space-4);
  border-bottom: 1px solid var(--color-border-subtle); cursor: pointer;
  transition: background 0.15s;
}
.notif-item:hover { background: rgba(99,102,241,0.04); }
.notif-item.unread { background: rgba(99,102,241,0.06); }
.notif-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px;
}
.notif-dot.unread { background: var(--color-brand-indigo); }
.notif-dot.read { background: transparent; }
.notif-content { flex: 1; min-width: 0; }
.notif-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.notif-body { font-size: 12px; color: var(--color-text-tertiary); line-height: 1.5; }
.notif-time { font-size: 11px; color: var(--color-text-disabled); margin-top: 4px; }
.notif-icon {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.notif-icon.warning { background: rgba(245,158,11,0.12); }
.notif-icon.error { background: rgba(239,68,68,0.12); }
.notif-icon.success { background: rgba(52,211,153,0.12); }
.notif-icon.info { background: rgba(99,102,241,0.12); }
/* 空状态 */
.empty-state { text-align: center; padding: var(--space-10); color: var(--color-text-tertiary); }
.empty-state .icon { font-size: 40px; margin-bottom: var(--space-4); }
.empty-state p { font-size: 13px; }
/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
  background: var(--color-elevated); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); padding: 10px 20px; font-size: 13px; color: var(--color-text-primary);
  opacity: 0; transition: all 0.3s; z-index: 1000; white-space: nowrap;
}
.toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
@media (max-width: 480px) {
  .container { padding: var(--space-3); }
  .header h1 { font-size: 14px; }
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<header class="header">
  <a class="header-back" href="/workspace/project_001">← 返回</a>
  <h1>🔔 通知</h1>
  <div class="header-actions">
    <button onclick="markAllRead()">全部已读</button>
  </div>
</header>

<div class="container" id="notifList">
  <!-- 由 JS 动态渲染 -->
</div>

<script>
// Mock 数据（正式版从 GET /api/v1/notifications 获取）
var MOCK_NOTIFS = [
  { id: "n_01", type: "phase4_failed", title: "收纳失败", body: "第 12 章「林霄的抉择」收纳失败，已自动重试。", time: "2026-06-11T14:32:00Z", read: false },
  { id: "n_02", type: "health_alert", title: "伏笔待回收", body: "伏笔「地宫秘密」已 12 章无任何推进，建议安排回收。", time: "2026-06-11T10:15:00Z", read: false },
  { id: "n_03", type: "health_alert", title: "子情节提醒", body: "「神秘人的真实身份」已 8 章未推进。", time: "2026-06-10T22:00:00Z", read: false },
  { id: "n_04", type: "payment_success", title: "订阅已激活", body: "Pro 计划已激活，优先生成队列已启用。", time: "2026-06-09T08:00:00Z", read: true },
  { id: "n_05", type: "system_announcement", title: "新功能：秘密矩阵", body: "新增秘密矩阵功能，可追踪角色间的信息不对称。", time: "2026-06-08T12:00:00Z", read: true },
  { id: "n_06", type: "phase4_stuck", title: "收纳连续失败", body: "检测到连续 5 章收纳失败，已自动暂停。请检查 AI 服务状态。", time: "2026-06-07T16:45:00Z", read: true },
];

// 通知类型 → 图标/颜色
var TYPE_CONFIG = {
  phase4_failed:   { icon: "⚠️", cls: "warning" },
  phase4_stuck:    { icon: "🚫", cls: "error" },
  health_alert:    { icon: "🏥", cls: "warning" },
  payment_success: { icon: "✅", cls: "success" },
  payment_failed:  { icon: "❌", cls: "error" },
  system_announcement: { icon: "📢", cls: "info" },
};

function timeAgo(iso) {
  var diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff/60) + ' 分钟前';
  if (diff < 86400) return Math.floor(diff/3600) + ' 小时前';
  return Math.floor(diff/86400) + ' 天前';
}

function render() {
  var list = document.getElementById('notifList');
  if (!MOCK_NOTIFS.length) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🔔</div><p>暂无通知</p></div>';
    return;
  }
  list.innerHTML = MOCK_NOTIFS.map(function(n) {
    var cfg = TYPE_CONFIG[n.type] || { icon: "📌", cls: "info" };
    return '<div class="notif-item' + (n.read ? '' : ' unread') + '" onclick="markRead(\'' + n.id + '\')">' +
      '<div class="notif-icon ' + cfg.cls + '">' + cfg.icon + '</div>' +
      '<div class="notif-content">' +
        '<div class="notif-title">' + n.title + '</div>' +
        '<div class="notif-body">' + n.body + '</div>' +
        '<div class="notif-time">' + timeAgo(n.time) + '</div>' +
      '</div>' +
      '<div class="notif-dot' + (n.read ? ' read' : ' unread') + '"></div>' +
    '</div>';
  }).join('');
}

function markRead(id) {
  var n = MOCK_NOTIFS.find(function(x) { return x.id === id; });
  if (n) n.read = true;
  render();
  showToast('已标记为已读');
}

function markAllRead() {
  MOCK_NOTIFS.forEach(function(n) { n.read = true; });
  render();
  showToast('全部已读');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('visible');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('visible'); }, 2000);
}

render();
</script>
</body>
</html>
