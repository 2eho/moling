# ==========================================================================
# 墨灵 (Moling) — Nginx Reverse Proxy Configuration
# ==========================================================================
#
# Routes:
#   /api/*      → Rust API server (moling-app:8000)
#   /moling/*   → Frontend SPA (moling-web:3000 or static)
#   /            → Redirect to /moling/
#
# Health checks:
#   GET /health  → Proxied to moling-app:8000/api/v1/health

upstream moling_api {
    server moling-app:8000;
    keepalive 32;
}

upstream moling_web {
    server moling-web:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Request ID for tracing
    proxy_set_header X-Request-ID $request_id;

    # ── API routes ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://moling_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_connect_timeout 10s;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ── Health check (standalone) ────────────────────────────────────────
    location = /health {
        proxy_pass http://moling_api/api/v1/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Frontend routes ──────────────────────────────────────────────────
    location /moling/ {
        proxy_pass http://moling_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Root redirect ────────────────────────────────────────────────────
    location = / {
        return 302 /moling/;
    }

    # ── Static assets (optional) ─────────────────────────────────────────
    # location /static/ {
    #     alias /app/static/;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/html;

    # ── Logging ──────────────────────────────────────────────────────────
    access_log /var/log/nginx/moling_access.log;
    error_log /var/log/nginx/moling_error.log warn;
}
