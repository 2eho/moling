# ==============================================================================
# Moling — 端到端集成测试 Docker Compose（Rust 后端）
# ==============================================================================
# 说明:
#   - 此文件用于 CI 或本地执行 Rust 后端的端到端测试
#   - 数据库使用 tmpfs 临时存储，容器停止即销毁（不持久化）
#   - 端口映射偏移避免与开发/生产环境冲突（5433/6380/8001）
#
# 启动测试:
#   docker compose -f docker/docker-compose.test.yml up --build --abort-on-container-exit
#
# 仅启动依赖服务（手动运行测试）:
#   docker compose -f docker/docker-compose.test.yml up -d db-test redis-test
# ==============================================================================

version: "3.9"

services:
  # ---- PostgreSQL 16 测试数据库 ----
  db-test:
    image: postgres:16-alpine
    container_name: moling-test-db
    environment:
      POSTGRES_USER: moling
      POSTGRES_PASSWORD: moling_test
      POSTGRES_DB: moling_test
    ports:
      - "5433:5432" # 避免与开发(5432)冲突
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moling -d moling_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data # 测试数据不持久化，容器停止即销毁

  # ---- Redis 7 测试缓存 ----
  redis-test:
    image: redis:7-alpine
    container_name: moling-test-redis
    ports:
      - "6380:6379" # 避免与开发(6379)冲突
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Rust 后端测试应用 ----
  moling-test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: moling-test-app
    ports:
      - "8001:8000" # 测试端口，避免与开发(8000)冲突
    environment:
      MOLING_HOST: "0.0.0.0"
      MOLING_PORT: "8000"
      MOLING_DATABASE_URL: "postgres://moling:moling_test@db-test:5432/moling_test"
      MOLING_REDIS_URL: "redis://redis-test:6379"
      MOLING_SECRET_KEY: "test-secret-key-do-not-use-in-production"
      RUST_LOG: "info,moling=debug"
      MOLING_ENV: "test"
    depends_on:
      db-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
