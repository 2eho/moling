# =============================================================================
# 墨灵 (Moling) — Cargo 构建配置
# =============================================================================
# 注意: CI 运行在 Linux，此文件仅用于本地 Windows 开发。
# 特定于平台的 linker/rustflags 用 cfg() 条件隔离。
# =============================================================================

# === 镜像源 (国内加速) ===
[source.crates-io]
replace-with = "tuna"

[source.tuna]
registry = "sparse+https://mirrors.tuna.tsinghua.edu.cn/crates.io-index/"

# === 构建 ===
[build]
jobs = 16

# === 本地 Windows 开发 (MinGW-w64) ===
[target.x86_64-pc-windows-gnu]
linker = "D:\\DevTools\\msys64\\msys64\\mingw64\\bin\\gcc.exe"
rustflags = [
    "-Cdebuginfo=1",
    "-Ccodegen-units=256",
]

# === 开发 profile ===
[profile.dev]
debug = 1
opt-level = 0
incremental = true
codegen-units = 256
lto = false

# === 发布 profile ===
[profile.release]
opt-level = 3
lto = true
codegen-units = 1
debug = 0
strip = "symbols"
panic = "abort"
