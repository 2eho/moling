# =============================================================================
# 墨灵 (Moling) — Cargo 构建配置
# =============================================================================
# 目标: 加速 debug 编译 + 减小 target/ 体积 (当前 31GB → ~3GB)

# ═════════════════════════════════════════════════════════════════════════════
# 镜像源 — 国内加速（本地开发必配，否则依赖下载极慢）
# ═════════════════════════════════════════════════════════════════════════════
[source.crates-io]
replace-with = "tuna"

[source.tuna]
registry = "sparse+https://mirrors.tuna.tsinghua.edu.cn/crates.io-index/"

# ═════════════════════════════════════════════════════════════════════════════
# 构建参数
# ═════════════════════════════════════════════════════════════════════════════
[build]
# 并行编译任务数 = CPU 核心数
jobs = 16

# MSYS2 MinGW-w64 GCC 链接器 (避免 MSVC 链接器兼容性问题)
[target.'cfg(target_env = "gnu")']
linker = "D:\\DevTools\\msys64\\msys64\\mingw64\\bin\\gcc.exe"

[target.x86_64-pc-windows-gnu]
linker = "D:\\DevTools\\msys64\\msys64\\mingw64\\bin\\gcc.exe"
rustflags = [
    # 减少 debug 信息 (line-directives-only 足够调试，全量 dwarf 占 80% 体积)
    "-Cdebuginfo=1",
    # 多个 codegen 单元 (并行编译加速)
    "-Ccodegen-units=256",
]

# =============================================================================
# 开发 profile — 优化编译速度
# =============================================================================
[profile.dev]
# 减少 debug 信息 (line-directives-only: 最小开销)
debug = 1
# opt-level=0 编译最快 (不做优化)
opt-level = 0
# 增量编译 (已默认)
incremental = true
# 延迟 codegen (更快链接)
codegen-units = 256
# 链接时优化 (dev 模式关闭)
lto = false

# =============================================================================
# 发布 profile — 优化运行性能
# =============================================================================
[profile.release]
opt-level = 3
lto = true
codegen-units = 1
debug = 0
strip = "symbols"
panic = "abort"
