# ==============================================================================
# Moling 宿主机 Nginx 配置
# 放置到云服务器 /etc/nginx/conf.d/moling.conf
# 统一通过 http://IP/moling 访问前端，API 在 /moling/api/
# ==============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # 根路径 → 重定向到 /moling/
    location = / {
        return 301 /moling/;
    }

    # ==========================================================================
    # 前端静态文件（代理到 web 容器，保留 /moling 前缀，basePath 已配置）
    # ==========================================================================
    location /moling/ {
        proxy_pass http://127.0.0.1:3000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================================================
    # API 反向代理（/moling/api/* → 后端容器，去掉 /moling 前缀保留 /api）
    # ==========================================================================
    location /moling/api/ {
        rewrite ^/moling(/api/.*)$ $1 break;
        proxy_pass http://127.0.0.1:8000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 长超时（AI 生成场景可能很久）
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # 禁用缓冲（流式响应）
        proxy_buffering off;
    }

    # ==========================================================================
    # API 文档（通过 /moling/api/docs 访问 Swagger）
    # ==========================================================================
    location /moling/api/docs {
        proxy_pass http://127.0.0.1:8000/api/docs;
        proxy_set_header Host $host;
    }

    # ==========================================================================
    # 错误页面
    # ==========================================================================
    error_page 500 502 503 504 /moling/50x.html;
}
