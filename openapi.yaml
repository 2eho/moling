    Template:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        genre:
          type: string
        tags:
          type: array
          items:
            type: string

    TemplateDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        genre:
          type: string
        tags:
          type: array
          items:
            type: string
        structure:
          type: object
        created_at:
          type: string
          format: date-time

    Phase4Task:
      type: object
      properties:
        id:
          type: integer
