        type:
          type: string
        status:
          type: string
        urgency:
          type: string
        related_characters:
          type: array
          items:
            type: string
        planted_chapter:
          type: integer

    PlotPromiseDetail:
      type: object
      properties:
        id:
          type: integer
        description:
          type: string
        type:
          type: string
        status:
          type: string
        urgency:
          type: string
        related_characters:
          type: array
          items:
            type: string
        planted_chapter:
          type: integer
        advancement_log:
          type: array
        event_type:
          type: string
        notes:
          type: string

    WorldElement:
      type: object
      properties:
