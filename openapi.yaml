  /templates/{id}/create-project:
    post:
      summary: 从模板创建项目
      tags: [模板]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                author:
                  type: string
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  project_id:
                    type: integer
                  title:
                    type: string
                  status:
                    type: string

  # ==================== 导入 ====================
  /import:
    get:
      summary: 获取导入列表
      tags: [导入]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: 页码
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          description: 每页数量
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  imports:
                    type: array
                    items:
                      type: object
                      properties:
                        job_id:
                          type: string
                        project_id:
                          type: integer
                        status:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                  total:
                    type: integer
                  page:
                    type: integer
                  page_size:
                    type: integer

  /projects/{pid}/import:
    post:
      summary: 提交导入任务
      tags: [导入]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        '202':
          description: 已接受
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string

  /projects/{pid}/import/{jobid}:
    get:
      summary: 轮询导入进度
      tags: [导入]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
        - name: jobid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  progress:
                    type: object
                    properties:
                      phase:
                        type: string
                      percent:
                        type: integer
                  result:
                    type: object
                  conflicts:
                    type: array

  /projects/{pid}/import/{jobid}/phase1:
    post:
      summary: 执行 Phase 1（四库提取）
      tags: [导入]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
        - name: jobid
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: 已接受

  /projects/{pid}/import/{jobid}/phase2:
    post:
      summary: 执行 Phase 2（动态层分析）
      tags: [导入]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
        - name: jobid
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: 已接受

  /projects/{pid}/import/{jobid}/confirm:
    post:
      summary: 确认导入
      tags: [导入]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
        - name: jobid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 导入成功

  # ==================== 生成任务 ====================
  /generate/{task_id}/status:
    get:
      summary: 获取生成任务状态
      tags: [生成]
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [pending, running, done, failed]
                  progress:
                    type: object
                  result:
                    type: object

  /generate/{task_id}/cancel:
    post:
      summary: 取消生成任务
      tags: [生成]
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 已取消
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  # ==================== Phase 4 ====================
  /phase4/pending-reviews:
    get:
      summary: 获取待审核数量
      tags: [Phase4]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /phase4/apply:
    post:
      summary: 应用精修建议
      tags: [Phase4]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [suggestion_ids, chapter_id]
              properties:
                suggestion_ids:
                  type: array
                  items:
                    type: integer
                chapter_id:
                  type: integer
      responses:
        '200':
          description: 应用成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  updated_content:
                    type: string

  /phase4/chapters/{chapter_id}/tasks:
    get:
      summary: 获取章节 Phase 4 任务列表
      tags: [Phase4]
      security:
        - bearerAuth: []
      parameters:
        - name: chapter_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Phase4Task'

  /phase4/projects/{project_id}/tasks:
    get:
      summary: 获取项目 Phase 4 任务列表
      tags: [Phase4]
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Phase4Task'

  # ==================== 订阅 ====================
  /subscriptions/plans:
    get:
      summary: 获取套餐列表
      tags: [订阅]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plan'

  /subscriptions:
    post:
      summary: 创建订阅
      tags: [订阅]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id]
              properties:
                plan_id:
                  type: integer
                auto_renew:
                  type: boolean
                  default: true
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          description: 用户已有活跃订阅或套餐不存在

  /subscriptions/current:
    get:
      summary: 获取当前订阅信息
      tags: [订阅]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'

  /subscriptions/create-checkout:
    post:
      summary: 创建支付会话
      tags: [订阅]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id]
              properties:
                plan_id:
                  type: string
                billing_cycle:
                  type: string
                  enum: [monthly, yearly]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkout_url:
                    type: string

  /subscriptions/payment-history:
    get:
      summary: 获取支付记录
      tags: [订阅]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentRecord'

  # ==================== 通知 ====================
  /notifications:
    get:
      summary: 获取通知列表
      tags: [通知]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'

  /notifications/unread-count:
    get:
      summary: 获取未读通知计数
      tags: [通知]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /notifications/{id}/read:
    post:
      summary: 标记单条已读
      tags: [通知]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 标记成功

  /notifications/read-all:
    post:
      summary: 全部已读
      tags: [通知]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: 标记成功

  /notifications/{id}:
    delete:
      summary: 删除通知
      tags: [通知]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 删除成功

  # ==================== 系统 ====================
  /system/health:
    get:
      summary: 系统健康检查（别名）
      tags: [系统]
      responses:
        '200':
          description: 系统正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string

  # ==================== 管理后台 ====================
  /admin/users:
    get:
      summary: 获取用户列表
      tags: [管理后台]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: q
          in: query
          description: 搜索关键字
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  total:
                    type: integer
                  page:
                    type: integer
                  page_size:
                    type: integer
        '403':
          description: 无权访问

  /admin/users/{id}:
    patch:
      summary: 编辑用户
      tags: [管理后台]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                banned:
                  type: boolean
      responses:
        '200':
          description: 更新成功
        '403':
          description: 无权访问

  /admin/stats:
    get:
      summary: 系统概览统计
      tags: [管理后台]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStats'
        '403':
          description: 无权访问

  /admin/llm-usage:
    get:
      summary: LLM 用量统计
      tags: [管理后台]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMUsage'
        '403':
          description: 无权访问

  /admin/llm-config:
    get:
      summary: 获取 LLM 配置
      tags: [管理后台]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMConfig'
        '403':
          description: 无权访问
    post:
      summary: 更新 LLM 配置
      tags: [管理后台]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                model:
                  type: string
                temperature:
                  type: number
                max_tokens:
                  type: integer
                api_key:
                  type: string
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  provider:
                    type: string
                  model:
                    type: string
                  updated_at:
                    type: string
        '403':
          description: 无权访问

  /admin/llm-config/test:
    post:
      summary: 测试 LLM 连接
      tags: [管理后台]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, model]
              properties:
                provider:
                  type: string
                model:
                  type: string
                api_key:
                  type: string
      responses:
        '200':
          description: 测试成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  latency_ms:
                    type: integer
                  error:
                    type: string
        '403':
          description: 无权访问

  /admin/projects:
    get:
      summary: 获取所有项目列表
      tags: [管理后台]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: q
          in: query
          description: 搜索关键字
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  total:
                    type: integer
                  page:
                    type: integer
                  page_size:
                    type: integer
        '403':
          description: 无权访问

components:
  securitySchemes:
    bearerAuth:
      type: http
