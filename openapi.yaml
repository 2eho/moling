        chapter_id:
          type: integer
        chapter_number:
          type: integer
        card_id:
          type: integer
        card_name:
          type: string
        card_rarity:
          type: string
        card_description:
          type: string
        draw_round:
          type: integer
        weights:
          type: array
          items:
            type: integer
        mode:
          type: string
        generated_content:
          type: string
        drawn_at:
          type: string
          format: date-time

    Settings:
      type: object
