  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        nickname:
          type: string
        email:
          type: string
        avatar_url:
          type: string
        created_at:
          type: string
          format: date-time

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        nickname:
          type: string
        bio:
          type: string
        avatar_url:
          type: string
        email:
          type: string
        created_at:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        genre:
          type: string
        chapters:
          type: integer
        words:
          type: integer
        status:
          type: string
        synopsis:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Chapter:
      type: object
      properties:
        id:
          type: integer
        chapter_number:
          type: integer
        title:
          type: string
        content:
          type: string
        status:
          type: string
        phase4_status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Card:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
        rarity:
          type: string
        description:
          type: string
        direction_text:
          type: string
        source_chapter:
          type: integer
        freshness_chapter:
          type: integer
        created_at:
          type: string
          format: date-time

    Suggestion:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        title:
          type: string
        description:
          type: string
        impact:
          type: string

    HealthAlert:
      type: object
