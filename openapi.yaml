openapi: 3.0.3
info:
  title: 墨灵 (Moling) API
  description: |
    墨灵小说创作平台后端 API 规范。

    ## 响应格式说明

    所有 API 响应都被 `ResponseFormatMiddleware` 包装成统一格式：

    ```json
    {
      "code": 0,
      "message": "success",
      "data": { ... },  // 实际数据在这里
      "meta": { ... }
    }
    ```

    - `code`: 状态码，0 表示成功
    - `message`: 状态消息
    - `data`: 实际响应数据
    - `meta`: 元数据（如分页信息）

    **注意**：前端 `apiClient` 返回完整响应 JSON，前端代码使用 `res.data` 获取实际数据。

    ## 已知问题

    1. **路径不匹配**：
       - `GET /projects/{pid}/secrets/{role}` 应为 `/projects/{pid}/secrets/character/{name}`
       - `GET /phase4/suggestions/{cid}` 应为 `/phase4/chapters/{cid}/suggestions`

    2. **重复端点**：
       - `GET /projects/{pid}/cards` 和 `GET /projects/{pid}/cards/pool` 功能重复
       - `GET /health` 和 `GET /api/v1/health` 都存在

    3. **废弃端点**：
       - `GET /projects/{pid}/cards/history` 应使用 `/projects/{pid}/cards/draw-history`
  version: 1.0.0
  contact:
    name: 墨灵团队
servers:
  - url: http://localhost:8000/api/v1
    description: 本地开发服务器
  - url: https://api.moling.com/api/v1
    description: 生产环境
security:
  - bearerAuth: []
paths:
  # ==================== 认证相关 ====================
  /auth/login:
    post:
      summary: 用户登录
      tags: [认证]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: 邮箱或密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: 操作太频繁
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/register:
    post:
      summary: 用户注册
      tags: [认证]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nickname, email, password]
              properties:
                nickname:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '409':
          description: 该邮箱已注册
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      summary: 刷新 Token
      tags: [认证]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
        '401':
          description: refresh_token 无效

  /auth/me:
    get:
      summary: 获取当前用户信息
      tags: [认证]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: 未授权
    put:
      summary: 更新用户资料
      tags: [认证]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                bio:
                  type: string
                avatar:
                  type: string
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /auth/password-reset-request:
    post:
      summary: 密码重置请求
      tags: [认证]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '204':
          description: 邮件已发送（始终返回204防止枚举）

  /auth/password-reset:
    post:
      summary: 设置新密码
      tags: [认证]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:
                  type: string
                new_password:
                  type: string
                  format: password
      responses:
        '200':
          description: 密码已重置
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: token 无效或已过期

  # ==================== 项目管理 ====================
  /projects:
    get:
      summary: 获取项目列表
      tags: [项目]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          description: 搜索关键字
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
    post:
      summary: 创建项目
      tags: [项目]
      security:
        - bearerAuth: []
      parameters:
        - name: draft
          in: query
          description: 是否为草稿
          schema:
            type: boolean
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, genre]
              properties:
                title:
                  type: string
                author:
                  type: string
                genre:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                synopsis:
                  type: string
                worldview:
                  type: string
                protagonist:
                  type: string
                supporting_chars:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      description:
                        type: string
                word_count:
                  type: integer
                frequency:
                  type: string
                style:
                  type: string
                creation_mode:
                  type: string
                template_id:
                  type: integer
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /projects/stats:
    get:
      summary: 获取项目统计概览
      tags: [项目]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_projects:
                    type: integer
                  total_words:
                    type: integer
                  today_words:
                    type: integer

  /projects/{id}:
    get:
      summary: 获取项目详情
      tags: [项目]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: 项目不存在
    put:
      summary: 更新项目
      tags: [项目]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                genre:
                  type: string
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
    delete:
      summary: 删除项目
      tags: [项目]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 删除成功
        '404':
          description: 项目不存在

  /projects/{pid}/chapters:
    get:
      summary: 获取章节列表
      tags: [章节]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  chapters:
                    type: array
                    items:
                      $ref: '#/components/schemas/Chapter'
                  total:
                    type: integer
                  page:
                    type: integer
                  page_size:
                    type: integer
    post:
      summary: 创建章节
      tags: [章节]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                status:
                  type: string
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chapter'

  /projects/{pid}/chapters/{id}:
    get:
      summary: 获取章节详情
      tags: [章节]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chapter'
    put:
      summary: 更新章节
      tags: [章节]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: 更新成功
    delete:
      summary: 删除章节
      tags: [章节]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 删除成功

  /projects/{pid}/chapters/current:
    get:
      summary: 获取当前章节
      tags: [章节]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chapter'

  /projects/{pid}/chapters/reorder:
    post:
      summary: 重排序章节
      tags: [章节]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chapter_numbers]
              properties:
                chapter_numbers:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  chapters:
                    type: array
                    items:
                      $ref: '#/components/schemas/Chapter'

  /projects/{pid}/chapters/{id}/generate:
    post:
      summary: 生成章节
      tags: [生成]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [card_ids]
              properties:
                card_ids:
                  type: array
                  items:
                    type: integer
                weights:
                  type: array
                  items:
                    type: integer
                mode:
                  type: string
                  enum: [single, dual, all, hybrid]
                creativity:
                  type: integer
                  minimum: 1
                  maximum: 10
                word_count:
                  type: integer
                  minimum: 500
                  maximum: 5000
      responses:
        '202':
          description: 已接受，正在生成
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string

  /projects/{pid}/chapters/{id}/confirm:
    post:
      summary: 确认收纳
      tags: [生成]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nonce]
              properties:
                nonce:
                  type: string
      responses:
        '202':
          description: 已接受
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                  status:
                    type: string

  /projects/{pid}/chapters/{id}/revise:
    post:
      summary: 拒稿/修改
      tags: [生成]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  suggestion:
                    type: string

  /projects/{pid}/chapters/{id}/redraw:
    post:
      summary: 重抽卡牌
      tags: [抽卡]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                keep_card_ids:
                  type: array
                  items:
                    type: integer
                draw_count:
                  type: integer
                  default: 3
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  cards:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'
                  remaining_redraws:
                    type: integer
                  recommended:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'

  /projects/{pid}/chapters/{id}/suggestions:
    get:
      summary: 获取章节 AI 建议
      tags: [工作台]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  suggestions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Suggestion'

  /projects/{pid}/chapters/{id}/agent:
    post:
      summary: AI 指令
      tags: [工作台]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command]
              properties:
                command:
                  type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                  actions:
                    type: array

  /projects/{pid}/health:
    get:
      summary: 项目健康检查
      tags: [健康监控]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items:
                      $ref: '#/components/schemas/HealthAlert'
                  checked_at:
                    type: string
                    format: date-time

  /projects/{pid}/health/refresh:
    post:
      summary: 刷新健康检查
      tags: [健康监控]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items:
                      $ref: '#/components/schemas/HealthAlert'
                  checked_at:
                    type: string
                    format: date-time

  /projects/suggestions:
    get:
      summary: 创作建议
      tags: [项目]
      security:
        - bearerAuth: []
      parameters:
        - name: title
          in: query
          schema:
            type: string
        - name: genre
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  world_ideas:
                    type: array
                    items:
                      type: string
                  character_archetypes:
                    type: array
                    items:
                      type: string
                  story_hooks:
                    type: array
                    items:
                      type: string

  # ==================== 抽卡相关 ====================
  /projects/{pid}/cards/pool:
    get:
      summary: 获取候选卡池
      tags: [抽卡]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
        - name: count
          in: query
          schema:
            type: integer
            default: 3
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  cards:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'
                  total_count:
                    type: integer
                  by_rarity:
                    type: object
                    properties:
                      common:
                        type: integer
                      rare:
                        type: integer
                      epic:
                        type: integer
                      legendary:
                        type: integer

  /projects/{pid}/cards/draw:
    post:
      summary: 执行抽卡
      tags: [抽卡]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chapter_id, keep_card_ids]
              properties:
                chapter_id:
                  type: integer
                keep_card_ids:
                  type: array
                  items:
                    type: integer
                draw_count:
                  type: integer
                  default: 3
                weights:
                  type: array
                  items:
                    type: integer
                mode:
                  type: string
                  enum: [single, dual, all, hybrid]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  cards:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'
                  remaining_redraws:
                    type: integer
                  draw_round:
                    type: integer

  /projects/{pid}/cards:
    post:
      summary: 创建自定义卡牌
      tags: [抽卡]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type, rarity, description]
              properties:
                name:
                  type: string
                type:
                  type: string
                rarity:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'

  /projects/{pid}/cards/{id}/retire:
    post:
      summary: 退役卡牌
      tags: [抽卡]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 退役成功

  /projects/{pid}/cards/draw-history:
    get:
      summary: 抽卡历史
      tags: [抽卡]
      security:
        - bearerAuth: []
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: chapter_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  draws:
                    type: array
                    items:
