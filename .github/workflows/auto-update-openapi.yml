name: Auto Update OpenAPI Spec

on:
  push:
    paths:
      - 'moling-server/**'
      - '015_前后端接口映射.md'
    branches:
      - main

jobs:
  update-openapi:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Generate OpenAPI spec from doc (no deps needed)
        run: |
          cd moling-server
          python scripts/generate_openapi_from_doc.py
        continue-on-error: false
      
      - name: Check if openapi.json changed
        id: check_changes
        run: |
          if git diff --quiet openapi.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add openapi.json
          git commit -m "auto: 自动更新 OpenAPI 规范 [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Comment on commit (if failed)
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '⚠️ OpenAPI 规范自动更新失败，请检查 GitHub Actions 日志'
            })
