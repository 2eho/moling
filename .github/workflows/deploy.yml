# ======================================================================
# Moling Deploy — 构建 → 推送 → 部署
# ======================================================================
# 触发: push main 分支的 deploy/* / moling-server-rs/** / moling-web/**
# 也可以手动触发 (workflow_dispatch)
#
# 流程:
#   1. Build — 并行构建前端 + 后端 Docker 镜像
#   2. Push  — 推送到 GHCR (ghcr.io/2eho/moling)
#   3. Deploy — 服务器 self-hosted runner 拉取并重启
# ======================================================================

name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'moling-server-rs/**'
      - 'moling-web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: '部署前端'
        type: boolean
        default: true
      deploy_backend:
        description: '部署后端'
        type: boolean
        default: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_USER: ${{ github.repository_owner }}

jobs:
  # ====================================================================
  # Job 1: 构建并推送后端镜像
  # ====================================================================
  build-backend:
    name: Build Backend (Rust)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.deploy_backend
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ env.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ github.repository }}/moling-server
          tags: |
            type=sha,format=short
            type=ref,event=branch
            latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: moling-server-rs
          file: moling-server-rs/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ======================================================================
# Job 2: 构建并推送前端镜像
# ======================================================================
build-frontend:
  name: Build Frontend (Vite + React)
  runs-on: ubuntu-latest
  if: github.event_name != 'workflow_dispatch' || inputs.deploy_frontend

  steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.GHCR_REGISTRY }}
        username: ${{ env.GHCR_USER }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.GHCR_REGISTRY }}/${{ github.repository }}/moling-frontend
        tags: |
          type=sha,format=short
          type=ref,event=branch
          latest

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: moling-web
        file: moling-web/Dockerfile
        build-args: |
          VITE_API_BASE_URL=/api/v1
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ====================================================================
  # Job 3: 服务器部署（self-hosted runner）
  # ====================================================================
  deploy:
    name: Deploy to Server
    needs: [build-backend, build-frontend]
    if: always() && (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') && (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    runs-on: [self-hosted, moling-server]

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ env.GHCR_USER }}" --password-stdin

      - name: Pull latest images
        run: |
          docker pull ${{ env.GHCR_REGISTRY }}/${{ github.repository }}/moling-server:latest
          docker pull ${{ env.GHCR_REGISTRY }}/${{ github.repository }}/moling-frontend:latest

      - name: Deploy with docker compose
        run: |
          cd docker
          DEPLOY_VERSION=${{ github.sha }} docker compose -f docker-compose.prod.yml up -d --remove-orphans
          sleep 5

      - name: Health check
        run: |
          echo "Checking backend health..."
          curl -sf --max-time 10 http://localhost:8000/health && echo "✅ Backend OK" || echo "⚠️  Backend health check failed"
          echo "Checking frontend health..."
          curl -sf --max-time 10 http://localhost:3000/health && echo "✅ Frontend OK" || echo "⚠️  Frontend health check failed"

      - name: Prune old images
        run: docker image prune -af --filter "until=72h" || true

  # ====================================================================
  # 通知
  # ====================================================================
  notify:
    name: Notify
    needs: [deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "🎉 Deployment succeeded!"
          else
            echo "💥 Deployment failed! Check logs."
          fi
