# ==============================================================================
# Moling Preview — PR 预览环境 (Vite + React)
# ==============================================================================
# 触发: PR → main/develop
# Secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY
# ==============================================================================

name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

concurrency:
  group: preview-${{ github.head_ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  docker-build:
    name: Build Preview Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate PR tag
        id: pr
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          PR_SHA="${{ github.event.pull_request.head.sha }}"
          SHORT_SHA="${PR_SHA::7}"
          echo "tag=pr-${PR_NUM}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "pr_num=${PR_NUM}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./moling-web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/moling-frontend:preview
            ${{ env.REGISTRY }}/${{ github.repository }}/moling-frontend:${{ steps.pr.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: docker-build
    steps:
      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy preview container
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          PREVIEW_PORT=$((13000 + PR_NUM))

          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'DEPLOY_EOF'
            set -e

            PR_NUM="${PR_NUM}"
            PREVIEW_PORT="${PREVIEW_PORT}"
            IMAGE="ghcr.io/${{ github.repository }}/moling-frontend:preview"
            CONTAINER="moling-preview-pr-${PR_NUM}"

            echo "=== PR #${PR_NUM} Preview ==="
            echo "Port: ${PREVIEW_PORT}"

            docker login ghcr.io -u "${{ github.actor }}" --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}" 2>/dev/null || true
            docker pull "${IMAGE}"

            docker rm -f "${CONTAINER}" 2>/dev/null || true

            docker run -d \
              --name "${CONTAINER}" \
              --network moling-network \
              -p "${PREVIEW_PORT}:3000" \
              -e NODE_ENV=production \
              --restart no \
              "${IMAGE}"

            echo "Container started: ${CONTAINER}"

            for i in $(seq 1 30); do
              if curl -sf --max-time 5 "http://localhost:${PREVIEW_PORT}" > /dev/null 2>&1; then
                echo "Preview ready"
                break
              fi
              sleep 2
            done
          DEPLOY_EOF
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}

  comment:
    name: Comment on PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: preview
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            const PR_NUM = context.issue.number;
            const PREVIEW_PORT = 13000 + PR_NUM;
            const status = '${{ needs.preview.result }}' === 'success' ? 'Deployed' : 'Failed';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: PR_NUM,
              body: `## Preview\n| Status | Port | URL |\n|--------|------|-----|\n| ${status} | ${PREVIEW_PORT} | http://124.222.163.79:${PREVIEW_PORT} |`
            });
