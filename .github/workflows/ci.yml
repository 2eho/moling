name: Moling CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: moling_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: $-pip-$
      - name: Install dependencies
        run: |
          cd moling-server
          python -m pip install --upgrade pip
          pip install ".[dev]"
          pip install pytest pytest-asyncio httpx
      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/moling_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          ALGORITHM: HS256
        run: |
          cd moling-server
          python -m pytest tests/ -v --tb=short --junitxml=report.xml
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: moling-server/report.xml

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install frontend dependencies
        run: |
          cd moling-web
          npm install
      - name: Install backend dependencies
        run: |
          cd moling-server
          python -m pip install --upgrade pip
          pip install ".[dev]"
          pip install uvicorn
      - name: Install Playwright browsers
        run: |
          cd moling-web
          npx playwright install --with-deps chromium
      - name: Start backend
        env:
          DATABASE_URL: sqlite+aiosqlite://
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          ALGORITHM: HS256
        run: |
          cd moling-server
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
      - name: Start frontend
        run: |
          cd moling-web
          npm run build
          npm run start &
          sleep 5
      - name: Run Playwright tests
        run: |
          cd moling-web
          npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: moling-web/playwright-report/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          cd moling-server
          python -m pip install --upgrade pip
          pip install ".[dev]"
          pip install flake8 bandit safety
      - name: Run flake8
        run: |
          cd moling-server
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Run Bandit security scan
        run: |
          cd moling-server
          bandit -r app/ -f json -o bandit-report.json || true
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: moling-server/bandit-report.json

  performance:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          cd moling-server
          python -m pip install --upgrade pip
          pip install ".[dev]"
          pip install requests
      - name: Start backend
        env:
          DATABASE_URL: sqlite+aiosqlite://
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          ALGORITHM: HS256
        run: |
          cd moling-server
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 10
      - name: Run performance tests
        run: |
          cd moling-server/tests/performance
          python simple_performance_test.py --all --host http://localhost:8000 --output performance_report.json
      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: moling-server/tests/performance/performance_report.json
