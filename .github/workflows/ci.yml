# ==============================================================================
# Moling CI — 统一持续集成管道
# ==============================================================================
# 设计原则:
#   - 触发条件: push/PR 到 develop 和 main
#   - 核心检查 (测试+构建) 必须通过，阻断合并
#   - 代码检查 (lint) 报告但不阻断
#   = 部署通过 workflow_dispatch 手动触发
#
# 分支策略: Trunk-Based Development
#   develop — 集成分支，日常合入
#   main    — 生产分支，仅从 develop merge
#
# 相关文档: docs/GIT_WORKFLOW_GUIDE.md
# ==============================================================================

name: Moling CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  # ==========================================================================
  # Job 1: 后端测试（PostgreSQL + Redis）
  #   阻断条件：develop 和 main 的 PR
  # ==========================================================================
  backend-test:
    name: 后端测试
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: moling_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 缓存 pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('moling-server/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 安装依赖
        run: |
          cd moling-server
          python -m pip install --upgrade pip
          pip install ".[dev]"
          pip install pytest pytest-asyncio httpx pytest-cov

      - name: 运行后端测试
        env:
          DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/moling_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          ALGORITHM: HS256
        run: |
          cd moling-server
          python -m pytest tests/ -v --tb=short --junitxml=report.xml

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: moling-server/report.xml

  # ==========================================================================
  # Job 2: 前端构建验证
  #   阻断条件：develop 和 main 的 PR
  # ==========================================================================
  frontend-build:
    name: 前端构建验证
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: moling-web/package-lock.json

      - name: 安装依赖
        run: cd moling-web && npm ci

      - name: 构建前端
        run: cd moling-web && npm run build

      - name: Lint 检查
        continue-on-error: true
        run: cd moling-web && npm run lint

      - name: 上传构建产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: moling-web/.next/

  # ==========================================================================
  # Job 3: 代码风格检查（宽松模式，不阻断主流程）
  # ==========================================================================
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    continue-on-error: true  # 整体不阻断
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 安装依赖
        run: |
          cd moling-server
          python -m pip install --upgrade pip
          pip install ".[dev]"
          pip install flake8 bandit safety

      - name: flake8 检查
        run: |
          cd moling-server
          flake8 app/ --count --exit-zero --max-line-length=127 --statistics

      - name: Bandit 安全扫描
        run: |
          cd moling-server
          bandit -r app/ -f json -o bandit-report.json

      - name: 上传检查报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: moling-server/bandit-report.json

  # ==========================================================================
  # Job 4: OpenAPI 规范校验
  # ==========================================================================
  openapi-validate:
    name: OpenAPI 校验
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 生成 OpenAPI 规范
        run: |
          cd moling-server
          python scripts/generate_openapi_from_doc.py

      - name: 校验 JSON 格式
        run: python -m json.tool openapi.json > /dev/null

      - name: 上传规范文件
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: openapi.json
