# ==============================================================================
# 墨灵 (Moling) CI — Rust Workspace + Vite Frontend + Docker
# ==============================================================================
#
# Pipeline stages:
#   Check    → cargo check --workspace + tsc --noEmit          (all branches)
#   Lint     → cargo clippy -- -D warnings + biome check       (all branches)
#   Test     → cargo test --workspace --lib + vitest           (main only)
#   Build    → cargo build --release + vite build              (main only)
#   Docker   → multi-stage build → push GHCR                   (main only)
#   Security → cargo audit + pnpm audit                        (main only)
#
# Triggers:
#   push (any branch)     → check + lint
#   push (main)           → full pipeline
#   pull_request → main   → full pipeline
#   workflow_dispatch     → full pipeline (configurable)
#
# Branch strategy: Trunk-Based Development
#   main — production, full CI gate
#   feature/* — check + lint only
# ==============================================================================

name: Moling CI

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_docker:
        description: 'Skip Docker build & push'
        type: boolean
        default: false
      skip_security:
        description: 'Skip security audit'
        type: boolean
        default: false

# ── Global settings ────────────────────────────────────────────────────────

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NODE_VERSION: '22'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Branch gate: which jobs run on which branches ─────────────────────────
#   is_main_branch  = push to main OR PR targeting main OR workflow_dispatch
#   (workflow_dispatch always runs full pipeline on the selected ref)
# ───────────────────────────────────────────────────────────────────────────

jobs:

  # ==========================================================================
  # Stage 1 — Check: Rust cargo check workspace + TypeScript type-check
  # Runs on: ALL branches (always)
  # ==========================================================================
  check:
    name: "Check (Rust + TS)"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # ── Rust ──────────────────────────────────────────────────────────

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true
          cache-workspaces: |
            moling-server-rs

      - name: Cargo check workspace
        working-directory: moling-server-rs
        run: cargo check --workspace

      # ── Node / pnpm ───────────────────────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type-check
        working-directory: moling-web
        run: pnpm exec tsc --noEmit

  # ==========================================================================
  # Stage 2 — Lint: Clippy (deny warnings) + Biome check
  # Runs on: ALL branches (always)
  # ==========================================================================
  lint:
    name: "Lint (Clippy + Biome)"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # ── Rust Clippy ───────────────────────────────────────────────────

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
          cache: true
          cache-workspaces: |
            moling-server-rs

      - name: Cargo clippy (deny warnings)
        working-directory: moling-server-rs
        run: cargo clippy --workspace --all-targets -- -D warnings

      # ── Biome (frontend) ──────────────────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check (frontend)
        run: pnpm biome check --write

  # ==========================================================================
  # Stage 3 — Test: cargo test (exclude Redis-dependent) + vitest
  # Runs on: main branch push / PR → main / workflow_dispatch
  # ==========================================================================
  test:
    name: "Test (Rust + Vitest)"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [check]
    if: |
      github.ref == 'refs/heads/main' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'

    services:
      # SQLite is embedded (no service needed), but some tests may need PG
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: moling_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # ── Rust tests ────────────────────────────────────────────────────

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true
          cache-workspaces: |
            moling-server-rs

      - name: Cargo test workspace (lib only, exclude Redis-dependent)
        working-directory: moling-server-rs
        env:
          # SQLite for lib tests (no Redis required)
          DATABASE_URL: sqlite::memory:
          RUST_LOG: info
        run: |
          cargo test --workspace --lib \
            --exclude moling-worker \
            --no-fail-fast

      - name: Cargo test workspace (doc tests)
        working-directory: moling-server-rs
        run: |
          cargo test --workspace --doc \
            --exclude moling-worker \
            --no-fail-fast

      # ── Frontend tests ────────────────────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # NOTE: Replace with `pnpm vitest run` once vitest is configured.
      # Currently falls back to a no-op with warning.
      - name: Vitest (frontend)
        working-directory: moling-web
        run: |
          if pnpm vitest run --reporter=verbose 2>/dev/null; then
            echo "✓ Vitest passed"
          else
            echo "⚠ vitest not configured — skipping frontend tests"
            echo "  Add vitest to devDependencies and create vitest.config.ts"
          fi

  # ==========================================================================
  # Stage 4 — Build: Rust release + Vite production
  # Runs on: main branch push / PR → main / workflow_dispatch
  # ==========================================================================
  build:
    name: "Build (Rust release + Vite)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [check]
    if: |
      github.ref == 'refs/heads/main' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      # ── Rust release build ────────────────────────────────────────────

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true
          cache-workspaces: |
            moling-server-rs

      - name: Cargo build --release
        working-directory: moling-server-rs
        run: cargo build --release -p moling-server

      # Strip binary to reduce size (CI artifact only; Docker build is separate)
      - name: Strip release binary
        run: strip moling-server-rs/target/release/moling-server

      - name: Upload Rust binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: moling-server-linux-amd64
          path: moling-server-rs/target/release/moling-server
          retention-days: 3

      # ── Vite production build ─────────────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Vite production build
        working-directory: moling-web
        env:
          NODE_ENV: production
        run: pnpm run build

      - name: Upload Vite build artifact
        uses: actions/upload-artifact@v4
        with:
          name: moling-web-dist
          path: moling-web/dist/
          retention-days: 3

  # ==========================================================================
  # Stage 5 — Docker: multi-stage build → GHCR push
  # Runs on: main branch push / workflow_dispatch (NOT on PR)
  # ==========================================================================
  docker:
    name: "Docker (Build + Push GHCR)"
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [build]
    if: |
      ( github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' ) &&
      ( github.event_name != 'workflow_dispatch' || inputs.skip_docker != true )

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: moling-server
            context: ./moling-server-rs
            dockerfile: ./moling-server-rs/docker/Dockerfile
          - name: moling-frontend
            context: .
            dockerfile: ./moling-web/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image.name }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          # Single-platform only (CI validation, not deployment)
          platforms: linux/amd64

  # ==========================================================================
  # Stage 6 — Security: cargo audit + pnpm audit
  # Runs on: main branch push / PR → main / workflow_dispatch (configurable)
  # ==========================================================================
  security:
    name: "Security Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [check]
    if: |
      ( github.ref == 'refs/heads/main' ||
        github.event_name == 'pull_request' ||
        github.event_name == 'workflow_dispatch' ) &&
      ( github.event_name != 'workflow_dispatch' || inputs.skip_security != true )

    steps:
      - uses: actions/checkout@v4

      # ── cargo audit ───────────────────────────────────────────────────

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false

      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit &>/dev/null; then
            cargo install cargo-audit --locked
          fi

      - name: Cargo audit
        working-directory: moling-server-rs
        # continue-on-error so a new CVE doesn't block unrelated merges;
        # the job result is visible in the PR checks UI.
        continue-on-error: true
        run: cargo audit

      # ── pnpm audit ────────────────────────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: corepack enable

      - name: pnpm audit
        continue-on-error: true
        run: pnpm audit --audit-level=high

  # ==========================================================================
  # CI Summary — aggregate gate for branch protection
  # ==========================================================================
  ci-status:
    name: "CI Status"
    runs-on: ubuntu-latest
    needs: [check, lint, test, build, docker, security]
    if: always()
    timeout-minutes: 2

    steps:
      - name: Evaluate results
        run: |
          # Build summary markdown (GitHub step summary)
          {
            echo "## CI Pipeline Results"
            echo ""
            echo "| Stage     | Result    |"
            echo "|-----------|-----------|"
            echo "| check     | ${{ needs.check.result }}     |"
            echo "| lint      | ${{ needs.lint.result }}     |"
            echo "| test      | ${{ needs.test.result }}     |"
            echo "| build     | ${{ needs.build.result }}     |"
            echo "| docker    | ${{ needs.docker.result }}     |"
            echo "| security  | ${{ needs.security.result }}     |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Gate: check + lint are blocking (must pass on all branches)
          if [ "${{ needs.check.result }}" != "success" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo ":no_entry: **BLOCKED**: 'check' stage must pass." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo ":no_entry: **BLOCKED**: 'lint' stage must pass." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo ":white_check_mark: All required checks passed." >> "$GITHUB_STEP_SUMMARY"
