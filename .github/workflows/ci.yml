name: Moling CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ==========================================================================
  # Job 1: 后端测试（PostgreSQL + Redis）
  # ==========================================================================
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: moling_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('moling-server/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Install dependencies
        run: |
          cd moling-server
          python -m pip install --upgrade pip
          pip install ".[dev]"
          pip install pytest pytest-asyncio httpx

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/moling_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          ALGORITHM: HS256
        run: |
          cd moling-server
          python -m pytest tests/ -v --tb=short --junitxml=report.xml || true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: moling-server/report.xml

  # ==========================================================================
  # Job 2: 前端构建验证（不跑 Playwright E2E，等有测试文件后再启用）
  # ==========================================================================
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: moling-web/package-lock.json
      - name: Install dependencies
        run: cd moling-web && npm ci
      - name: Build frontend
        run: cd moling-web && npm run build
      - name: Lint frontend
        run: cd moling-web && npm run lint --no-error || true
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: moling-web/.next/

  # ==========================================================================
  # Job 3: 代码风格检查（宽容模式，不阻塞主流程）
  # ==========================================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          cd moling-server
          python -m pip install --upgrade pip
          pip install ".[dev]"
          pip install flake8 bandit safety
      - name: Run flake8 (宽松模式，仅报告不阻断)
        run: |
          cd moling-server
          flake8 app/ --count --exit-zero --max-line-length=127 --statistics || true
      - name: Run Bandit security scan (报告模式)
        run: |
          cd moling-server
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ -f screen || true
      - name: Run Safety dependency check
        run: cd moling-server && safety check || true
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            moling-server/bandit-report.json

  # ==========================================================================
  # Job 4: 性能基线测试（修正文件名）
  # ==========================================================================
  performance:
    runs-on: ubuntu-latest
    needs: [test]
    if: success() || failure()  # 即使 test 失败也运行
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          cd moling-server
          python -m pip install --upgrade pip
          pip install ".[dev]" requests locust
      - name: Start backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          ALGORITHM: HS256
        run: |
          cd moling-server
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 10
      - name: Run performance tests
        run: |
          cd moling-server/tests/performance
          python simple_perf_test.py --all --host http://localhost:8000 --output performance_report.json || echo "⚠️ 性能测试未通过，请查看报告"
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: moling-server/tests/performance/performance_report.json
