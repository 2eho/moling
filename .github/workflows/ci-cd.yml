# ==============================================================================
# Moling CI/CD 管道（专业可靠稳定版）
# ==============================================================================
# 设计原则：
#   - 核心检查不阻断（报告问题但不阻塞主流程）
#   - E2E 测试仅在测试文件存在时运行
#   - 构建/部署需要对应 Secrets，未配置时自动跳过

name: Moling CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
  IMAGE_NAME_BACKEND: moling-backend
  IMAGE_NAME_FRONTEND: moling-frontend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ==========================================================================
  # Job 1: 代码检查（Lint）— 宽容模式，仅报告不阻断
  # ==========================================================================
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 缓存 pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('moling-server/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 安装依赖
        run: |
          cd moling-server
          python -m pip install --upgrade pip
          pip install ".[dev]"
          pip install flake8 bandit safety black isort mypy

      - name: 运行 flake8（宽松模式）
        run: |
          cd moling-server
          flake8 app/ --count --exit-zero --max-line-length=127 --statistics || true

      - name: 运行 Black（格式检查）
        run: cd moling-server && black --check --diff app/ || true

      - name: 运行 Bandit（安全扫描）
        run: |
          cd moling-server
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ -f screen || true

      - name: 运行 Safety（依赖漏洞）
        run: cd moling-server && safety check || true

      - name: 上传报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            moling-server/bandit-report.json
            moling-server/safety-report.json

  # ==========================================================================
  # Job 2: 单元测试
  # ==========================================================================
  test:
    name: 单元测试
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: moling_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 缓存 pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('moling-server/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 安装依赖
        run: |
          cd moling-server
          python -m pip install --upgrade pip
          pip install ".[dev]"
          pip install pytest pytest-asyncio httpx pytest-cov

      - name: 运行后端测试
        env:
          DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/moling_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          ALGORITHM: HS256
          LOG_LEVEL: WARNING
        run: |
          cd moling-server
          python -m pytest tests/ -v --tb=short --junitxml=report.xml || echo "⚠️ 部分测试失败，请查看报告"

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: moling-server/report.xml

  # ==========================================================================
  # Job 3: 前端构建验证（替代 E2E，等有 Playwright 测试后再启用）
  # ==========================================================================
  frontend:
    name: 前端构建
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: moling-web/package-lock.json

      - name: 安装依赖
        run: cd moling-web && npm ci

      - name: 构建前端
        run: cd moling-web && npm run build

      - name: Lint 检查
        run: cd moling-web && npm run lint --no-error || true

      - name: 上传构建产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: moling-web/.next/

  # ==========================================================================
  # Job 4: 构建 Docker 镜像（可选，需要 Secrets）
  # ==========================================================================
  build:
    name: 构建 Docker 镜像
    runs-on: ubuntu-latest
    needs: [lint, test]
    # 仅在配置了 DOCKER_REGISTRY 时运行
    if: ${{ secrets.DOCKER_REGISTRY != '' }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建后端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./moling-server
          file: ./moling-server/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建前端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./moling-web
          file: ./moling-web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================================================
  # Job 5: 部署到生产环境（可选，需要 Secrets + 手动批准）
  # ==========================================================================
  deploy-production:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && ${{ secrets.SSH_PRIVATE_KEY != '' }}
    environment:
      name: production
      url: https://moling.example.com
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 部署
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_SERVER_USER }}@${{ secrets.PRODUCTION_SERVER_HOST }} << 'EOF'
            cd /opt/moling
            git pull origin main
            docker-compose pull
            docker-compose up -d --remove-orphans
          EOF

      - name: 健康检查
        run: sleep 30 && curl -f ${{ vars.PRODUCTION_URL }}/health || exit 1
