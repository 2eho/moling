name: OpenAPI Spec Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate OpenAPI spec from doc
        run: |
          cd moling-server
          python scripts/generate_openapi_from_doc.py

      - name: Check JSON validity
        run: |
          python -m json.tool openapi.json > /dev/null && echo "OK" || echo "FAIL"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: openapi.json
