name: OpenAPI Spec Check

on:
  push:
    paths:
      - 'moling-server/**'
      - '015_*.md'
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  # ==========================================================================
  # Job 1: 验证 OpenAPI 规范（始终运行）
  # ==========================================================================
  check-openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # 从接口文档生成（无依赖，100% 可靠）
      - name: Generate OpenAPI spec from doc
        run: |
          cd moling-server
          python scripts/generate_openapi_from_doc.py

      # 验证 JSON 合法性 + 路径数检查
      - name: Validate openapi.json format
        run: |
          python -m json.tool openapi.json > /dev/null && echo "✅ openapi.json 是合法的 JSON"
          python -c "
import json
d = json.load(open('openapi.json'))
paths = d.get('paths', {})
tags = d.get('tags', [])
print(f'✅ 路径数：{len(paths)}')
print(f'✅ Tag 数：{len(tags)}')
if len(paths) < 50:
    print('⚠️ 路径数量异常少，请检查接口文档')
"

      - name: Upload openapi.json as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: openapi.json

  # ==========================================================================
  # Job 2: 自动更新（仅 main 分支 push 触发，且不依赖 Job 1）
  # ==========================================================================
  auto-update:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate OpenAPI spec from doc
        run: cd moling-server && python scripts/generate_openapi_from_doc.py

      - name: Check if changed
        id: check
        run: |
          git diff --quiet openapi.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.check.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add openapi.json
          git commit -m "auto: 更新 OpenAPI 规范 [skip ci]"
          git push
