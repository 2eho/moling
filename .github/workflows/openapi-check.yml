name: OpenAPI Spec Check

on:
  push:
    branches: [main, master]
    paths:
      - 'moling-server/**'
      - '015_前后端接口映射.md'
      - 'openapi.json'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ==========================================================================
  # Job 1: 验证 OpenAPI 规范（检查，不阻断）
  # ==========================================================================
  check-openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate OpenAPI spec from doc
        run: |
          cd moling-server
          python scripts/generate_openapi_from_doc.py

      - name: Validate openapi.json
        run: |
          python -m json.tool openapi.json > /dev/null 2>&1
          echo "✅ JSON 格式合法"
          python -c "import json; d=json.load(open('openapi.json')); print(f'路径数：{len(d.get(\"paths\",{}))}'); print(f'Tag 数：{len(d.get(\"tags\",[]))}')"
        continue-on-error: true

      - name: Upload openapi.json as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: openapi.json

  # ==========================================================================
  # Job 2: 自动更新 openapi.json（仅 push 到 main 时）
  # ==========================================================================
  auto-update:
    runs-on: ubuntu-latest
    # 正确的 if 语法：用 parentheses 包裹条件
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate OpenAPI spec from doc
        run: |
          cd moling-server
          python scripts/generate_openapi_from_doc.py

      - name: Check if openapi.json changed
        id: check
        run: |
          if git diff --quiet openapi.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add openapi.json
          git commit -m "auto: 自动更新 OpenAPI 规范 [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
