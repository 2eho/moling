name: OpenAPI Spec Check

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  # ==========================================================================
  # Job 1: 验证 OpenAPI 规范（宽容模式，不阻断）
  # ==========================================================================
  check-openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate OpenAPI spec from doc
        run: |
          cd moling-server
          python scripts/generate_openapi_from_doc.py || echo "⚠️ 脚本执行失败，使用已有 openapi.json"

      - name: Validate openapi.json format
        run: |
          python -m json.tool openapi.json > /dev/null && echo "✅ openapi.json 是合法的 JSON" || echo "❌ openapi.json 不是合法 JSON"
          python -c "
import json
try:
    d = json.load(open('openapi.json'))
    paths = d.get('paths', {})
    tags = d.get('tags', [])
    print(f'✅ 路径数：{len(paths)}')
    print(f'✅ Tag 数：{len(tags)}')
except Exception as e:
    print(f'❌ 解析失败：{e}')
"
        continue-on-error: true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: openapi.json

  # ==========================================================================
  # Job 2: 自动更新（独立运行，容错）
  # ==========================================================================
  auto-update:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate OpenAPI spec from doc
        run: cd moling-server && python scripts/generate_openapi_from_doc.py || true

      - name: Validate generated file
        id: validate
        run: |
          if [ ! -f openapi.json ]; then
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          python -m json.tool openapi.json > /dev/null 2>&1
          if [ $? -eq 0 ]; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if changed
        id: check
        if: steps.validate.outputs.valid == 'true'
        run: |
          git diff --quiet openapi.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.check.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add openapi.json
          git commit -m "auto: 更新 OpenAPI 规范 [skip ci]"
          git push || echo "⚠️ 推送失败（可能已被其他 workflow 更新）"
