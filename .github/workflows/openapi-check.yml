name: OpenAPI Spec Check

on:
  push:
    paths:
      - 'moling-server/**'
      - 'openapi.json'
  pull_request:
    paths:
      - 'moling-server/**'
      - 'openapi.json'

jobs:
  check-openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          cd moling-server
          pip install -r requirements.txt
      
      - name: Check OpenAPI spec
        run: |
          cd moling-server
          python scripts/export_openapi.py --check
