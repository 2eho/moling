# ==============================================================================
# 墨灵 Moling — 宿主机 Nginx 反向代理（增强安全版）
# ==============================================================================
# 部署: sudo cp deploy/nginx/moling.conf /etc/nginx/conf.d/moling.conf
# 验证: sudo nginx -t
# 重载: sudo nginx -s reload
#
# 架构: 浏览器 → :8080 (Nginx) → :3000 (前端 Next.js)
#                                    → :8000 (后端 FastAPI)
#
# 安全特性:
#   - 速率限制（API 100 req/s，静态资源 500 req/s）
#   - 安全响应头（HSTS, CSP, X-Frame-Options 等）
#   - Gzip 压缩
#   - 静态资源长缓存
#   - 请求体大小限制
# ==============================================================================

# ---- 速率限制区域 ----
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=500r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ---- 上游服务器 ----
upstream moling_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream moling_backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    # ====================================================================
    # 全局安全配置
    # ====================================================================
    # 最大请求体 10MB
    client_max_body_size 10m;
    # 连接限制
    limit_conn conn_limit 20;

    # ---- 安全响应头 ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:" always;

    # ---- Gzip 压缩 ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ---- 日志 ----
    access_log /var/log/nginx/moling_access.log;
    error_log  /var/log/nginx/moling_error.log warn;

    # ====================================================================
    # 根路径 → 重定向到 /moling
    # ====================================================================
    location = / {
        return 301 /moling;
    }

    # ====================================================================
    # 健康检查端点（不限制速率）
    # ====================================================================
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ====================================================================
    # 前端静态资源 — Next.js (容器 3000)
    # ====================================================================
    location /moling {
        # Next.js standalone 模式，路径原样透传
        proxy_pass http://moling_frontend;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 缓冲
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Next.js 静态资源 — 长缓存
    location /moling/_next/static {
        proxy_pass http://moling_frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # 公共静态文件
    location /moling/static {
        proxy_pass http://moling_frontend;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ====================================================================
    # API 请求 — FastAPI (容器 8000)
    # ====================================================================
    location /moling/api/ {
        # 速率限制
        limit_req zone=api_limit burst=50 nodelay;

        # 必须 rewrite 去掉 /moling 前缀
        rewrite ^/moling(/api/.*)$ $1 break;
        proxy_pass http://moling_backend;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # API 超时（AI 生成可能很长）
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # 关闭缓冲，支持 SSE 流式响应
        proxy_buffering off;

        # 不缓存 API 响应
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ====================================================================
    # API 文档 — 公开但不限速太狠
    # ====================================================================
    location /moling/api/v1/docs {
        rewrite ^/moling(/api/v1/docs)$ $1 break;
        proxy_pass http://moling_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /moling/api/v1/openapi.json {
        rewrite ^/moling(/api/v1/openapi.json)$ $1 break;
        proxy_pass http://moling_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*";
    }

    # ====================================================================
    # Prometheus 指标（仅内网）
    # ====================================================================
    location /moling/api/v1/metrics {
        allow 127.0.0.1;
        allow 172.20.0.0/16;  # Docker 内网
        deny all;

        rewrite ^/moling(/api/v1/metrics)$ $1 break;
        proxy_pass http://moling_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ====================================================================
    # 错误页面
    # ====================================================================
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
